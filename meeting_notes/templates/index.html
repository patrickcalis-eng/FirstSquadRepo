<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Notes Uploader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1a1a1a;
      margin: 0;
      padding: 0;
    }
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    h1 {
      margin-bottom: 0.5rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.08);
      padding: 1.8rem;
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    input[type="file"], textarea, button {
      width: 100%;
      font-size: 1rem;
      border-radius: 12px;
      border: 1px solid #d0d7df;
      padding: 0.9rem 1rem;
      margin-bottom: 1rem;
    }
    textarea {
      min-height: 200px;
      resize: vertical;
    }
    button {
      background: #3d5afe;
      color: white;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      padding: 1rem;
      font-weight: 700;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(61, 90, 254, 0.2);
    }
    .output {
      display: grid;
      gap: 1rem;
    }
    .output section {
      background: #f8fafc;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      padding: 1rem;
    }
    .output pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 0;
    }
    .tag {
      display: inline-block;
      background: #e8f0ff;
      color: #2c4df2;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    .error {
      background: #ffe8e8;
      color: #8b0000;
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid #f5c2c2;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Meeting Notes</h1>
      <p>Upload een geluidsbestand of plak een transcriptie om samenvatting, beslissingen en actiepunten te genereren.</p>
      <form id="meeting-form">
        <label>
          Audio upload (mp3/wav):
          <input type="file" id="audio_file" name="audio_file" accept="audio/*" />
        </label>
        <label>
          Transcriptie tekst (optioneel):
          <textarea id="transcript_text" name="transcript_text" placeholder="Plak hier de transcriptie als je die al hebt..."></textarea>
        </label>
        <button type="submit">Genereer notulen</button>
      </form>
      <div id="error" class="error" style="display: none;"></div>
    </div>
    <div id="output" class="output"></div>
  </div>
  <script>
    const form = document.getElementById('meeting-form');
    const output = document.getElementById('output');
    const errorBox = document.getElementById('error');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.style.display = 'none';
      output.innerHTML = '';

      const formData = new FormData();
      const audioFile = document.getElementById('audio_file').files[0];
      const transcriptText = document.getElementById('transcript_text').value.trim();

      if (audioFile) {
        formData.append('audio_file', audioFile);
      }
      if (transcriptText) {
        formData.append('transcript_text', transcriptText);
      }
      if (!audioFile && !transcriptText) {
        showError('Upload een geluidsbestand of voer een transcriptie in.');
        return;
      }

      try {
        const response = await fetch('/transcribe', {
          method: 'POST',
          body: formData,
        });
        if (!response.ok) {
          const body = await response.json();
          throw new Error(body.error || 'Fout bij transcriberen.');
        }
        const data = await response.json();
        renderOutput(data);
      } catch (err) {
        showError(err.message);
      }
    });

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    function renderOutput(data) {
      output.innerHTML = `
        <section>
          <div class="tag">Samenvatting</div>
          <pre>${escapeHtml(data.summary)}</pre>
        </section>
        <section>
          <div class="tag">Besluiten</div>
          <pre>${escapeArray(data.decisions)}</pre>
        </section>
        <section>
          <div class="tag">Actiepunten</div>
          <pre>${escapeArray(data.action_items)}</pre>
        </section>
        <section>
          <div class="tag">Transcriptie</div>
          <pre>${escapeHtml(data.transcript)}</pre>
        </section>
      `;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeArray(items) {
      if (!items || items.length === 0) {
        return '';
      }
      return items.map(i => escapeHtml(i)).join('\n');
    }
  </script>
</body>
</html>
